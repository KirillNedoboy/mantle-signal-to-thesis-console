name: CI

on:
  push:
    branches: [main, hardening/**]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: pnpm install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: pnpm test
        run: pnpm test

      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm build
        run: pnpm build
